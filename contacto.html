<!DOCTYPE html>
<html lang="es">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACTO | ALMA DE MOTOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/Logo.jpg" alt="Alma de Motor">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="competencia1.html">Ética</a></li>
            <li><a href="competencia2.html">Comunicación</a></li>
            <li><a href="competencia3.html">Diseño</a></li>

            <li><a href="competencia7.html">Personal</a></li>
            <li><a href="bitacora.html">Bitácora</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <h1 class="reveal">
            <span>READY TO</span>
            RIDE?
        </h1>
    </header>

    <main class="container">
        <div class="contact-container">
            <div class="reveal">
                <form action="#">
                    <div class="form-group">
                        <input type="text" placeholder="NOMBRE COMPLETO" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="EMAIL CORPORATIVO" required>
                    </div>
                    <div class="form-group">
                        <textarea rows="6" placeholder="CUÉNTANOS TU PROYECTO O CONSULTA" required></textarea>
                    </div>
                    <button type="submit" class="btn-volt">ENVIAR TRANSMISIÓN</button>
                </form>
            </div>
            
            <div class="reveal">
                <div class="info-card">
                    <h3>STEALTH HQ</h3>
                    <p><i class="fas fa-location-dot" style="color: var(--acid); margin-right: 15px;"></i> Madrid, España</p>
                    <p><i class="fas fa-phone" style="color: var(--acid); margin-right: 15px;"></i> +34 900 123 456</p>
                    <p><i class="fas fa-envelope" style="color: var(--acid); margin-right: 15px;"></i> contact@almamotor.com</p>
                    <div style="margin-top: 40px; display: flex; gap: 20px;">
                        <a href="#" style="color: var(--white); font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                        <a href="#" style="color: var(--white); font-size: 1.5rem;"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <img src="assets/Logo.jpg" alt="Logo" style="height: 30px; opacity: 0.5;">
            <p style="color: #444;">ALMA DE MOTOR © 2026. STEALTH PERFORMANCE DIVISION.</p>
            <div style="display: flex; gap: 30px;">
                <a href="#" style="color: var(--acid);"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: var(--acid);"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>

</html>
